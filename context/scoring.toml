# Default BM25F and routing parameters for `oz context query`.
# Same values as internal/query.DefaultScoringConfig() unless overridden below.
# Tuning: run `oz context scoring list` and `oz context scoring describe <key>`.

[bm25]
k1 = 1.2

[fields]
b_text = 0.75
b_path = 0.5

[weights]
scope = 4.0
role = 2.5
responsibilities = 2.5
readchain = 0.0
skills = 0.6
context_topics = 0.6
rules = 0.5
out_of_scope_penalty = 2.5

[routing]
confidence_threshold = 0.7
min_score = 0.01
temperature = 0.2
min_candidate_confidence = 0.2

[retrieval]
include_notes = true
concept_min_relevance = 0.4
concept_min_fraction_of_top = 0.75
concept_min_query_coverage = 0.33
concept_use_bigrams = true
max_relevant_concepts = 10

[retrieval.trust_boost]
specs   = 1.6
docs    = 1.0
context = 1.0
notes   = 0.4

[retrieval.bm25]
k1 = 1.05

[retrieval.fields]
weight_title = 2.5
weight_path = 1.7
weight_body = 0.62

[retrieval.concepts]
weight_name = 2.0
weight_description = 1.0
weight_source_files = 1.2

[tokenize]
use_bigrams = false
