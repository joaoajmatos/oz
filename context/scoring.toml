# Default BM25F and routing parameters for `oz context query`.
# Same values as internal/query.DefaultScoringConfig() unless overridden below.
# Tuning: run `oz context scoring list` and `oz context scoring describe <key>`.

[bm25]
k1 = 1.2

[fields]
b_text = 0.75
b_path = 0.5

[weights]
scope = 4.0
role = 2.5
responsibilities = 2.5
readchain = 0.0
out_of_scope_penalty = 2.5

[routing]
confidence_threshold = 0.7
min_score = 0.01
temperature = 0.2
min_candidate_confidence = 0.2

[retrieval]
include_notes = true
concept_min_relevance = 0.1
concept_min_fraction_of_top = 0.5
max_relevant_concepts = 10

[retrieval.bm25]
# Slightly below routing k1: tighter term saturation in long decision bodies.
k1 = 1.05

[retrieval.fields]
# Favor title and path (ADR ids, section headings) over long bodies that may
# duplicate golden benchmark phrasing. See ADR-0004 / retrieval PRD.
weight_title = 2.5
weight_path = 1.7
weight_body = 0.62

[tokenize]
use_bigrams = false
